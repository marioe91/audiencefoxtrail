<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Page</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">

    <!-- Logo -->
    <header class="logo-section">
      <img src="logo.png" alt="Logo" class="logo" />
    </header>

    <!-- Content -->
    <main class="content">

      <h1>Bitte PIN eingeben</h1>

      <p>
        Bitte gib den vorhin erhaltenen PIN ein
      </p>

      <!-- Input -->
      <div class="input-container">
        <input
          type="number"
          id="numberInput"
          placeholder="PIN eingeben..."
        />

        <button onclick="checkNumber()">
          Absenden
        </button>
      </div>

      <!-- Error Message -->
      <div id="errorMessage" class="error-message">
        Falscher PIN :(
      </div>

      <!-- Hidden Content -->
      <div id="successContent" class="success-content">

        <h2>Nächster Posten freigeschaltet</h2>

        <div class="highlight-box">

          <div class="highlight-title">
            Hinweis
          </div>

          <p>
Dieses Sitzungszimmer ist nach dem Sender benannt, auf dem Echo der Zeit 1945 zum ersten Mal ausgestrahlt wurde          
        </p>

        </div>

    <div class="highlight-box">

          <div class="highlight-title">
            PIN
          </div>

          <p>
23
          </p>

        </div>


      </div>

    </main>

  </div>

  <script>
    function checkNumber() {
      const input = document.getElementById("numberInput").value;
      const errorMessage = document.getElementById("errorMessage");
      const successContent = document.getElementById("successContent");

      if (input === "17") {
        successContent.style.display = "block";
        errorMessage.style.display = "none";
      } else {
        successContent.style.display = "none";
        errorMessage.style.display = "block";
      }
    }
  </script>

</body>
</html>
